name: Feature request
description: Suggest an idea for the extension
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the notes panel or prompt queue to do?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: This extension is reader-first and intentionally minimal — a notes panel that doubles as a prompt queue.
      options:
        - label: I've read the README and believe this fits the extension's reader-first / prompt-queue scope.
          required: false
